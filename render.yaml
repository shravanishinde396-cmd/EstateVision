services:
  # 1. Python FastAPI AI Service
  - type: web
    name: estatevision-ai
    env: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGIN
        value: "*" # Will be restricted to the Vercel URL in production if desired
      - key: NVIDIA_API_KEY
        sync: false # User can configure their NVIDIA API Key for live AI advice

  # 2. Node.js Express API Server
  - type: web
    name: estatevision-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Needs to be provided by user (e.g., MongoDB Atlas connection string)
      - key: CLIENT_URL
        sync: false # Needs to be Vercel deployment URL (e.g., https://prop-pulse.vercel.app)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: estatevision-redis
          property: connectionString
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: estatevision-ai
          property: url
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

# 3. Redis Instance for Cron Jobs, BullMQ & Rate Limiter
redis:
  name: estatevision-redis
  plan: free
  ipAllowList: [] # Allow access from Render services only (secure default)
